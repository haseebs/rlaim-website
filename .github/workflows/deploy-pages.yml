name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.base-url.outputs.base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compute base URL
        id: base-url
        env:
          REPOSITORY: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$REPOSITORY" = "${OWNER}.github.io" ]; then
            echo "base_url=" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=/$REPOSITORY" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          BASE_URL: ${{ steps.base-url.outputs.base_url }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
